<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Lumina Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

<div id="header-placeholder"></div>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-3">
            <div class="profile-sidebar shadow-sm">
                <div class="text-center mb-4">
                    <div class="avatar-wrapper">
                        <img src="https://via.placeholder.com/100" class="avatar-img" alt="User" id="img">
                        <input type="file" id="profileImageInput" accept="image/*" hidden >
                        <button class="edit-avatar-btn" onclick="selectProfileImage();"><small>✎</small></button>
                    </div>

                </div>

                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                    <button class="profile-nav-link active border-0 w-100 text-start" data-bs-toggle="pill" data-bs-target="#personal-info">
                        Personal Information
                    </button>

                    <a href="index.html" class="profile-nav-link">Home</a>

                    <a href="My-Library.html" class="profile-nav-link">My Library</a>
                    <a href="cart.html" class="profile-nav-link">My Cart</a>
                    <a href="OrderList.html" class="profile-nav-link">My Purchases</a>


                    <hr>
                    <a href="#" class="profile-nav-link text-danger" onclick="logout();">Logout</a>
                </div>
            </div>
        </div>

        <div class="col-lg-9">
            <div class="tab-content" id="v-pills-tabContent">

                <div class="tab-pane fade show active" id="personal-info">
                    <div class="card border-0 shadow-sm p-4 rounded-4">
                        <h4 class="fw-bold mb-4">Update Profile Details</h4>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="fn"  value="John">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="ln" value="Doe">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" value="john.doe@example.com" id="e" disabled>
                                    <small class="text-muted">Email cannot be changed once verified.</small>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Since At</label>
                                    <input type="text" class="form-control" value="john.doe@example.com" id="date" disabled>
                                    <small class="text-muted">Email cannot be changed once verified.</small>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Mobile</label>
                                    <input type="text" class="form-control" value="0777061854" id="m" >
                                </div>

                                <div class="col-12 mt-4">
                                    <button onclick="updateProfil();" class="btn btn-accent px-4">Save Changes</button>
                                </div>
                            </div>
                    </div>
                </div>



            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/profile.js"></script>
<script src="assets/js/logout.js"></script>

<script src="assets/js/notification.js"></script>
<script src="assets/js/notiflix-aio-3.2.8.min.js"></script>
</body>
</html>
