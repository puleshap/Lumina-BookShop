<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Books | Lumina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

<div id="global-header"></div>

<main>
    <section class="search-header-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h2 class=" fw-bold text-center">Find Your Next Read</h2>

                    <div class="input-group search-input-group">
                        <input type="text" class="form-control" id="title" placeholder="Search by title...">
                        <button class="btn btn-primary px-4" onclick="searchbooks();" type="button">Search</button>
                        <button class="btn btn-outline-secondary px-4" type="button" data-bs-toggle="collapse" data-bs-target="#filterArea">
                            Apply Filters
                        </button>
                    </div>

                    <div class="collapse" id="filterArea">
                        <div class="filter-card shadow-sm">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Genre</label>
                                    <select id="genreSelect" class="form-select">
                                        <option value="0" selected>All Genres</option>


                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Author</label>
                                    <input type="text"  id="author" class="form-control" placeholder="e.g. Stephen King">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label small fw-bold">Price Range ($)</label>
                                    <div class="input-group">
                                        <input type="number" id="min_price" class="form-control" placeholder="Min">
                                        <input type="number" id="max_price" class="form-control" placeholder="Max">
                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="container py-5">
        <div id="book-results" class="row g-4">

            <div class="empty-search-state">
                <div class="state-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                        <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
                    </svg>
                </div>
                <h3>Ready to find a story?</h3>
                <p class="text-muted">Use the search bar above to look for titles, authors, or filter by your favorite genres.</p>
            </div>

            <div class="row g-4 d-none" id="actual-results-grid">
            </div>

        </div>
    </section>
    <section class="container py-5">
        <div id="book-pagination" class="row g-4">

        </div>
    </section>
</main>

<div id="footer-placeholder"></div>
<script src="assets/js/cart.js"></script>

<script src="assets/js/basicsearch.js"></script>
<script src="assets/js/notification.js"></script>
<script src="assets/js/notiflix-aio-3.2.8.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="assets/js/header2.js"></script>

</body>
</html>
