<main class="main-wrapper">

    <!-- Start My Account Area  -->
    <div class="axil-dashboard-area mt--30 mb--50">
        <div class="container">
            <div class="axil-dashboard-warp">
                <div class="axil-dashboard-author">
                    <div class="media">
                        <div class="thumbnail">
                            <img src="./assets/images/avatar.png" alt="Profile">
                        </div>
                        <div class="media-body">
                            <h5 class="title mb-0" id="username">Hello Name</h5>
                            <span class="joining-date" id="since">Smart Trade Member Since Sep 2024</span>
                        </div>
                    </div>
                </div>
                <div class="row">

                    <div class="col-12 ">
                        <div class="tab-content">

                            <div class="tab-pane fade show active" id="nav-account" role="tabpanel">
                                <div class="col-lg-12">
                                    <div class="axil-dashboard-account">
                                        <!--<form class="account-details-form">-->
                                        <div class="row mt-4">

                                            <div class="col-6">
                                                <label class="form-label">First Name</label>
                                                <input id="firstName" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-6">
                                                <label class="form-label">Last Name</label>
                                                <input id="lastName" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Mobile</label>
                                                <input id="mobile" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Password</label>
                                                <div class="input-group">
                                                    <input type="password" class="form-control text-white"
                                                           style="background-color:#002d5b;" id="password" readonly />
                                                    <button class="btn border border-1" style="color:steelblue;">
                                                        <i class="bi bi-eye-slash-fill"></i>
                                                    </button>
                                                </div>
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Email</label>
                                                <input type="text" class="form-control text-white"
                                                       style="background-color:#002d5b;" id="email" readonly />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Registered Date</label>
                                                <input type="text" class="form-control text-white"
                                                       style="background-color:#002d5b;" id="sinceAt" readonly />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Address Line 01</label>
                                                <input id="line1" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Address Line 02</label>
                                                <input id="line2" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-6">
                                                <label class="form-label">City</label>
                                                <select class="form-select text-white bg-dark" id="citySelect">
                                                    <option value="0">Select City</option>
                                                </select>
                                            </div>

                                            <div class="col-6">
                                                <label class="form-label">Postal Code</label>
                                                <input id="pcode" type="text" class="form-control text-white bg-dark" />
                                            </div>

                                            <div class="col-12">
                                                <label class="form-label">Gender</label>
                                                <input type="text" class="form-control text-white"
                                                       style="background-color:#002d5b;" id="gender" readonly />
                                            </div>

                                            <div class="col-12 d-grid mt-4">
                                                <button class="btn btn-success" onclick="updateProfile();">
                                                    Update My Profile
                                                </button>
                                            </div>

                                        </div>

                                        <!--</form>-->
                                    </div>
                                </div>
                            </div>
                            <p class="text-danger" id="message"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End My Account Area  -->

</main>

                    <div class="content">

                    </div>
                </div>
            </div>
            <div class="col">
                <div class="service-box service-style-2">

                    </div>
                    <div class="content">

            </div>
            <div class="col">
                <div class="service-box service-style-2">

                    </div>
                    <div class="content">
                        <h6 class="title">Pro Quality Support</h6>
                        <p>24/7 Live support.</p>
                    </div>
                </div>
            </div>
        </div>
