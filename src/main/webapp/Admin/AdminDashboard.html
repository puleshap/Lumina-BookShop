<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lumina Admin | Executive Summary</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="icon" href="../assets/logo.png" />

</head>
<body class="admin-dashboard">

<div class="d-flex">
    <aside class="admin-sidebar">
        <div class="sidebar-brand text-white">LUMINA<span style="color: var(--accent-orange)">.</span></div>
        <nav class="flex-grow-1">
            <a href="AdminDashboard.html" class="nav-item-stylized active">Dashboard</a>
            <a href="AdminUserManagement.html" class="nav-item-stylized">Users</a>
            <a href="AdminAuthorManagement.html" class="nav-item-stylized ">Authors</a>
            <a href="AdminGenreManagement.html" class="nav-item-stylized">Genres</a>
            <a href="AdminBookManagement.html" class="nav-item-stylized">Books</a>
            <a href="AdminOrderManagement.html" class="nav-item-stylized">Orders</a>

        </nav>
    </aside>

    <main class="flex-grow-1" style="margin-left: 280px; padding: 50px;">

        <header class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h1 class="fw-bold mb-0">Executive Summary</h1>
                <p class="text-white-50">Manage your store performance and analytics</p>
            </div>
            <div class="time-filter-group">
                <button class="filter-btn active">Total</button>
                <button class="filter-btn">This Year</button>
                <button class="filter-btn">This Month</button>
                <button class="filter-btn">Today</button>
            </div>
        </header>

        <div class="row g-4 mb-5">
            <div class="col-lg-8">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="summary-card-bespoke">
                            <div class="stat-label">Users</div>
                            <div class="stat-value text-white">8,402</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="summary-card-bespoke">
                            <div class="stat-label">Books</div>
                            <div class="stat-value text-white">1,250</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="summary-card-bespoke">
                            <div class="stat-label">Revenue</div>
                            <div class="stat-value text-white">$12.8k</div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="featured-book-card h-100">
                    <div class="featured-book-img">
                        <span class="small">COVER</span>
                    </div>
                    <div>
                        <div class="stat-label" style="color: var(--accent-orange)">Most Sold</div>
                        <h5 class="fw-bold mb-0">The Great Gatsby</h5>
                        <p class="small text-muted mb-0">240 Sold this period</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4 mb-5" id="charts-section">
            <div class="col-md-6">
                <div class="chart-container">
                    <h6 class="stat-label mb-4">Revenue Variation</h6>
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-container">
                    <h6 class="stat-label mb-4">New Customer Signups</h6>
                    <canvas id="signupChart"></canvas>
                </div>
            </div>
        </div>

    </main>
</div>


<script src="../assets/js/Admin/AdminDashboard.js"></script>
<script src="../assets/js/notiflix-aio-3.2.8.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
