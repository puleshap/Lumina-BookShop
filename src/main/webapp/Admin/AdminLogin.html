<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Lumina</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../assets/logo.png" />

</head>
<body class="bg-dark">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 mt-5">
            <div class="card shadow-lg p-4 border-0 rounded-4">
                <h3 class="text-center fw-bold mb-4">LUMINA ADMIN</h3>
                    <div class="mb-3">
                        <label class="form-label">Admin Username</label>
                        <input type="text" class="form-control" id="username">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                    </div>
                    <button type="submit" class="btn btn-dark w-100" onclick="AdminLogin();">Access Dashboard</button>
            </div>
        </div>
    </div>
</div>
<script src="../assets/js/notification.js"></script>
<script src="../assets/js/notiflix-aio-3.2.8.min.js"></script>
<script src="../assets/js/Admin/AdminLogin.js"></script>
</body>
</html>
