<main class="main-wrapper">
    <!-- Start Breadcrumb Area  -->

    <!-- End Breadcrumb Area  -->

    <!-- Start My Account Area  -->
    <div class="axil-dashboard-area mt--30 mb--50">
        <div class="container">
            <div class="axil-dashboard-warp">
                <div class="axil-dashboard-author">
                    <div class="media">
                        <div class="thumbnail">
                            <img src="./assets/images/avatar.png" alt="Profile">
                        </div>
                        <div class="media-body">
                            <h5 class="title mb-0" id="username">Hello Name</h5>
                            <span class="joining-date" id="since">Smart Trade Member Since Sep 2024</span>
                        </div>
                    </div>
                </div>
                <div class="row">

                    <div class="col-12">
                        <div class="tab-content">

                            <div class="tab-pane fade show active" id="nav-account" role="tabpanel">
                                <div class="col-lg-12">
                                    <div class="axil-dashboard-account">
                                        <!--<form class="account-details-form">-->
                                        <div class="row">
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>First Name</label>
                                                    <input type="text" class="form-control" value="" id="firstName">
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>Last Name</label>
                                                    <input type="text" class="form-control" value="" id="lastName">
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>Address Line One</label>
                                                    <input type="text" class="form-control" value="" id="lineOne">
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>Address Line Two</label>
                                                    <input type="text" class="form-control" value="" id="lineTwo">
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>Postal Code</label>
                                                    <input type="text" class="form-control" value="" id="postalCode">
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>City</label>
                                                    <select id="citySelect">
                                                        <option value="0">Select</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="col-lg-6">
                                                <div class="form-group">
                                                    <label>Mobile Number</label>
                                                    <input type="tel" class="form-control" value="" id="mobile">
                                                </div>
                                            </div>
                                            <div class="col-12">
                                                <h5 class="title">Password Change</h5>
                                                <div class="form-group">
                                                    <label>Current Password</label>
                                                    <input readonly type="password" class="form-control" value=""
                                                           id="currentPassword">
                                                </div>
                                                <div class="form-group">
                                                    <label>New Password</label>
                                                    <input type="password" class="form-control" id="newPassword">
                                                </div>
                                                <div class="form-group">
                                                    <label>Confirm New Password</label>
                                                    <input type="password" class="form-control" id="confirmPassword">
                                                </div>
                                                <div class="form-group mb--0 d-grid">
                                                    <input type="submit" class="axil-btn" value="Save Changes"
                                                           onclick="saveChanges();">
                                                </div>
                                            </div>
                                        </div>
                                        <!--</form>-->
                                    </div>
                                </div>
                            </div>
                            <p class="text-danger" id="message"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- End My Account Area  -->
