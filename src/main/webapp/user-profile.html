<body style="background: linear-gradient(to bottom, #002d5b, #000000); color: #ffffff;">
<header class="header axil-header header-style-1" id="page-header">
    <header-content></header-content>
</header>
<div class="container-fluid">
    <div class="row">

        <div class="col-12" style="background-color: steelblue;">
            <div class="row">

                <div class="col-12 mt-4 mb-4"
                     style="background: linear-gradient(to bottom, #002d5b, #000000); color: #ffffff;">
                    <div class="row g-2">

                        <div class="col-12">
                            <div class="p-3 py-5">

                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4 class="fw-bold text-white">Profile Settings</h4>
                                </div>

                                <!-- PROFILE IMAGE -->
                                <div class="d-flex flex-column align-items-center text-center p-3 py-5">
                                    <img src="resource/new_user.svg" class="rounded mt-5" style="width: 250px;" id="img" />

                                    <span class="fw-bold" id="fullName"></span>
                                    <span class="fw-bold text-white-50" id="emailText"></span>

                                    <input type="file" class="d-none" id="profileimage" />
                                    <label for="profileimage" class="btn btn-info mt-5">
                                        Change Profile Image
                                    </label>
                                </div>

                                <hr>

                                <div class="col-12" style="background-color: #002d5b;">
                                    <label class="form-label fw-bold fs-2">Note :</label>
                                    <label class="form-label fs-5">
                                        Highlighted settings cannot be changed under any circumstance
                                    </label>
                                </div>

                                <hr>

                                <div class="row mt-4">

                                    <div class="col-6">
                                        <label class="form-label">First Name</label>
                                        <input id="fname" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-6">
                                        <label class="form-label">Last Name</label>
                                        <input id="lname" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Mobile</label>
                                        <input id="mobile" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Password</label>
                                        <div class="input-group">
                                            <input type="password" class="form-control text-white"
                                                   style="background-color:#002d5b;" id="password" readonly />
                                            <button class="btn border border-1" style="color:steelblue;">
                                                <i class="bi bi-eye-slash-fill"></i>
                                            </button>
                                        </div>
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Email</label>
                                        <input type="text" class="form-control text-white"
                                               style="background-color:#002d5b;" id="email" readonly />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Registered Date</label>
                                        <input type="text" class="form-control text-white"
                                               style="background-color:#002d5b;" id="sinceAt" readonly />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Address Line 01</label>
                                        <input id="line1" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Address Line 02</label>
                                        <input id="line2" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-6">
                                        <label class="form-label">City</label>
                                        <select class="form-select text-white bg-dark" id="citySelect">
                                            <option value="0">Select City</option>
                                        </select>
                                    </div>

                                    <div class="col-6">
                                        <label class="form-label">Postal Code</label>
                                        <input id="pcode" type="text" class="form-control text-white bg-dark" />
                                    </div>

                                    <div class="col-12">
                                        <label class="form-label">Gender</label>
                                        <input type="text" class="form-control text-white"
                                               style="background-color:#002d5b;" id="gender" readonly />
                                    </div>

                                    <div class="col-12 d-grid mt-4">
                                        <button class="btn btn-success" onclick="updateProfile();">
                                            Update My Profile
                                        </button>
                                    </div>

                                </div>

                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>
</div>
