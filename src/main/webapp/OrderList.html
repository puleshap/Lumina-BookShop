<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Lumina Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

<div id="global-header"></div>

<main class="container py-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="profile.html" class="text-decoration-none">My Profile</a></li>
            <li class="breadcrumb-item active">Order History</li>
        </ol>
    </nav>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold mb-0">Past Orders</h2>

    </div>

    <div class="card border-0 shadow-sm overflow-hidden rounded-4">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-4">Order ID</th>
                    <th>Date</th>
                    <th>Items</th>
                    <th>Total Price</th>
                    <th>Status</th>
                    <th class="text-end pe-4">Action</th>
                </tr>
                </thead>
                <tbody id="table">

                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-4 p-3 bg-light rounded-3 text-center">
        <p class="mb-0 small text-muted">
            Missing an order? Please wait up to 10 minutes for digital processing or <a href="#" class="text-accent fw-bold text-decoration-none">Contact Support</a>.
        </p>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="assets/js/loadInvoiceList.js"></script>
<script src="assets/js/notification.js"></script>
<script src="assets/js/notiflix-aio-3.2.8.min.js"></script>
<script src="assets/js/header2.js"></script>


</body>
</html>
