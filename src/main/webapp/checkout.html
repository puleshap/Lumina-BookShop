<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Lumina Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/logo.png" />
</head>
<body>

<div id="header-placeholder"></div>

<main class="checkout-section">
    <div class="container">
        <h2 class="fw-bold mb-5">Checkout</h2>

        <div class="row g-5">
            <div class="col-lg-8">

                <div class="checkout-card shadow-sm">
                    <h4><span class="step-number">1</span> Shipping Information</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" placeholder="123 Main St" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">City</label>
                            <input type="text" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Zip Code</label>
                            <input type="text" class="form-control" required>
                        </div>
                    </div>
                </div>

                <div class="checkout-card shadow-sm">
                    <h4><span class="step-number">2</span> Payment Method</h4>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input type="radio" name="payment" id="creditCard" class="d-none payment-radio" checked>
                            <label for="creditCard" class="payment-option w-100 d-block">
                                <div class="fw-bold">Credit Card</div>
                                <small class="text-muted">Visa, Mastercard, Amex</small>
                            </label>
                        </div>
                        <div class="col-md-6">
                            <input type="radio" name="payment" id="paypal" class="d-none payment-radio">
                            <label for="paypal" class="payment-option w-100 d-block">
                                <div class="fw-bold">PayPal</div>
                                <small class="text-muted">Pay via your PayPal account</small>
                            </label>
                        </div>
                        <div class="col-12 mt-4">
                            <label class="form-label">Card Number</label>
                            <input type="text" class="form-control" placeholder="0000 0000 0000 0000">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Expiry Date</label>
                            <input type="text" class="form-control" placeholder="MM/YY">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">CVV</label>
                            <input type="text" class="form-control" placeholder="123">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="summary-card shadow-sm">
                    <h4 class="fw-bold mb-4">Your Order</h4>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-2 small">
                            <span>The Great Gatsby x 1</span>
                            <span>$14.99</span>
                        </div>
                        <div class="d-flex justify-content-between mb-2 small">
                            <span>Atomic Habits x 1</span>
                            <span>$12.50</span>
                        </div>
                    </div>

                    <hr>

                    <div class="d-flex justify-content-between mb-2">
                        <span>Subtotal</span>
                        <span>$27.49</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Tax</span>
                        <span>$2.20</span>
                    </div>
                    <div class="d-flex justify-content-between mt-3 mb-4">
                        <span class="fw-bold h5">Total</span>
                        <span class="fw-bold h5 text-accent">$29.69</span>
                    </div>

                    <button class="btn btn-accent btn-lg w-100">Complete Purchase</button>
                    <p class="text-center mt-3 small text-muted">
                        <svg width="12" height="12" fill="currentColor" class="bi bi-lock-fill me-1" viewBox="0 0 16 16">
                            <path d="M8 1a2 2 0 0 1 2.5 2.5V4h-5v-.5A2.5 2.5 0 0 1 8 1zm3.5 3v-.5a3.5 3.5 0 1 0-7 0V4H1v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V4z"/>
                        </svg> Secure Encrypted Transaction
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
