<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Lumina Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="header-placeholder"></div>

<main class="auth-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card auth-card">
                    <div class="row g-0">
                        <div class="col-md-6 p-5 bg-white">
                            <h2 class="fw-bold mb-4">Welcome Back</h2>

                            <a href="#" class="social-btn">
                                <img src="https://www.google.com/favicon.ico" width="18" alt="Google">
                                <span>Login with Google</span>
                            </a>

                            <div class="text-center my-3 text-muted">
                                <small>OR LOGIN WITH EMAIL</small>
                            </div>

                            <form>
                                <div class="mb-3">
                                    <label class="form-label">Email</label>
                                    <input type="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                                <div class="mb-3">
                                    <div class="d-flex justify-content-between">
                                        <label class="form-label">Password</label>
                                        <a href="#" class="small text-accent text-decoration-none">Forgot?</a>
                                    </div>
                                    <input type="password" class="form-control" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-accent w-100 py-2">Login</button>
                            </form>

                            <p class="text-center mt-4 mb-0">
                                New here? <a href="register.html" class="text-accent fw-bold text-decoration-none">Create Account</a>
                            </p>
                        </div>
                        <div class="col-md-6 auth-info-side d-none d-md-flex">
                            <h3 class="fw-bold mb-3">Expand Your Mind.</h3>
                            <p>Access your entire digital library from any device, anywhere in the world.</p>
                            <div class="mt-4">
                                <img src="https://via.placeholder.com/300x200?text=Ebook+Illustration" class="img-fluid rounded shadow" alt="Library">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script src="assets/js/notification.js"></script>
<script src="assets/js/notiflix-aio-3.2.8.min.js"></script>
</body>
</html>
